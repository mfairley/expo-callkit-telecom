name: Publish to npm

on:
  push:
    tags:
      - "v*"
  # Manual escape hatch — re-publish a specific tag with:
  #   gh workflow run publish.yml -f tag=vX.Y.Z
  # Always dispatched from `main` (where this workflow_dispatch block lives);
  # the `tag` input controls which commit gets checked out and verified.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.8)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm-prod
      url: https://www.npmjs.com/package/expo-callkit-telecom
    permissions:
      contents: read
      id-token: write # for npm provenance + trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
        with:
          # For workflow_dispatch, check out the tag the user named.
          # For tag-push events, github.ref is already refs/tags/vX.Y.Z so this is a no-op.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --provenance --access public

      # GitHub Release is created by release-please when the release PR merges,
      # so we don't create it here. Release notes come from CHANGELOG.md.
