name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

# Don't run two release-please jobs in parallel — they'd race on the same release PR.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT (instead of GITHUB_TOKEN) so that the tag push release-please
          # makes triggers the publish.yml workflow. The default GITHUB_TOKEN
          # cannot trigger downstream workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
